server:
  port: 8080

spring:
  application:
    name: repair-server

  datasource:
    # 本地开发默认连 localhost, Docker 环境通过环境变量覆盖
    url: jdbc:mysql://localhost:3306/community_repair?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  jpa:
    # 根据 Java 实体类自动更新表结构
    hibernate:
      ddl-auto: update
    # 开发时打印 SQL 方便调试
    show-sql: true

# 自定义应用配置
app:
  jwt:
    # 生产环境通过环境变量 APP_JWT_SECRET 覆盖
    secret: ${APP_JWT_SECRET:IamLuoHaoIamVErysuperhandsomegayyouknow}
  cors:
    # 生产环境通过环境变量 APP_CORS_ALLOWED_ORIGINS 覆盖
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}