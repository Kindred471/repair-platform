services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: repair_mysql
    # 不暴露端口到宿主机，只允许容器间通信
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: community_repair
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:alpine
    container_name: repair_redis
    # 不暴露端口到宿主机
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Java 后端服务
  server:
    build: ./server
    container_name: repair_server
    # 不直接暴露，由前端 Nginx 反向代理
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/community_repair?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: "http://120.27.214.217,http://120.27.214.217:80,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 前端 Nginx 服务
  client:
    build: ./client
    container_name: repair_client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
